<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ファイルブラウザー - Mock</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #666666;
      --border: #e0e0e0;
      --active: #007aff;
      --hover: #f0f0f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 450px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    /* Header */
    .header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--hover);
      border-radius: 24px;
      border: none;
    }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 16px;
      color: var(--text);
    }

    .search-box input::placeholder {
      color: var(--muted);
    }

    .search-icon {
      color: var(--muted);
      font-size: 18px;
      flex-shrink: 0;
    }

    /* Main content */
    .content {
      flex: 1;
      overflow-y: auto;
    }

    .file-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s ease;
      user-select: none;
    }

    .file-item:hover {
      background: var(--hover);
    }

    .file-item.active {
      background: rgba(0, 122, 255, 0.1);
    }

    .file-item.folder {
      cursor: pointer;
    }

    .file-item.folder.collapsed .file-icon {
      transform: rotate(-90deg);
    }

    .file-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: transform 0.2s ease;
    }

    .toggle-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: transform 0.2s ease;
      margin-left: auto;
    }

    .file-item.folder.collapsed .toggle-icon {
      transform: rotate(-90deg);
    }

    /* Footer */
    .footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 8px;
    }

    .footer-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .footer-btn.secondary {
      background: var(--hover);
      color: var(--text);
    }

    .footer-btn.secondary:active {
      background: #e0e0e0;
    }

    .footer-btn.primary {
      background: var(--active);
      color: white;
    }

    .footer-btn.primary:active {
      opacity: 0.8;
    }

    .footer-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Depth indicator */
    .depth-0 { padding-left: 0; }
    .depth-1 { padding-left: 24px; }
    .depth-2 { padding-left: 48px; }
    .depth-3 { padding-left: 72px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="ファイル検索">
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <ul class="file-list" id="fileList"></ul>
    </div>

    <!-- Footer -->
    <div class="footer">
      <button class="footer-btn secondary" id="cancelBtn">キャンセル</button>
      <button class="footer-btn primary" id="selectBtn" disabled>選択</button>
    </div>
  </div>

  <script>
    // ファイル構造
    const fileStructure = [
      {
        name: 'ドキュメント',
        type: 'folder',
        children: [
          { name: '2024年度計画.pdf', type: 'file', size: '2.4MB' },
          { name: 'プロジェクト提案書.docx', type: 'file', size: '1.8MB' },
          {
            name: '仕事',
            type: 'folder',
            children: [
              { name: '契約書.pdf', type: 'file', size: '892KB' },
              { name: '請求書テンプレート.xlsx', type: 'file', size: '156KB' },
              {
                name: '2024年',
                type: 'folder',
                children: [
                  { name: '1月レポート.xlsx', type: 'file', size: '234KB' },
                  { name: '2月レポート.xlsx', type: 'file', size: '245KB' },
                  { name: '3月レポート.xlsx', type: 'file', size: '251KB' },
                ]
              }
            ]
          }
        ]
      },
      {
        name: 'ダウンロード',
        type: 'folder',
        children: [
          { name: 'photo-2024-01-15.jpg', type: 'file', size: '5.2MB' },
          { name: 'software-installer.exe', type: 'file', size: '245MB' },
        ]
      },
      {
        name: '写真',
        type: 'folder',
        children: [
          {
            name: '2023年',
            type: 'folder',
            children: [
              { name: '1月.zip', type: 'file', size: '456MB' },
              { name: '2月.zip', type: 'file', size: '512MB' },
            ]
          },
          {
            name: '2024年',
            type: 'folder',
            children: [
              { name: 'スキー旅行.zip', type: 'file', size: '2.1GB' },
              { name: 'ビーチ.zip', type: 'file', size: '3.2GB' },
            ]
          }
        ]
      }
    ];

    let selectedItem = null;
    const fileList = document.getElementById('fileList');
    const selectBtn = document.getElementById('selectBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const searchInput = document.getElementById('searchInput');

    // ファイル一覧を描画
    function renderFileList(items, depth = 0) {
      let html = '';
      items.forEach((item) => {
        const isFolder = item.type === 'folder';
        const hasChildren = isFolder && item.children && item.children.length > 0;
        const icon = isFolder ? '📁' : '📄';
        
        html += `
          <li class="file-item ${isFolder ? 'folder' : 'file'} ${hasChildren ? 'collapsed' : ''} depth-${depth}" data-path="${item.name}" data-type="${item.type}" data-has-children="${hasChildren}">
            <div class="file-icon">${icon}</div>
            <div class="file-info">
              <div class="file-name">${item.name}</div>
              ${item.size ? `<div class="file-meta">${item.size}</div>` : ''}
            </div>
            ${hasChildren ? '<div class="toggle-icon">▶️</div>' : ''}
          </li>
        `;

        if (hasChildren) {
          html += renderFileList(item.children, depth + 1);
        }
      });
      return html;
    }

    // 初期レンダリング
    fileList.innerHTML = renderFileList(fileStructure);
    
    // 初期状態：深さ0より深いアイテムはすべて隠す
    document.querySelectorAll('.file-item').forEach(item => {
      const depth = parseInt(item.className.match(/depth-(\d+)/)[1]);
      if (depth > 0) {
        item.style.display = 'none';
      }
    });

    // ファイルアイテムのクリックイベント
    fileList.addEventListener('click', (e) => {
      const item = e.target.closest('.file-item');
      if (!item) return;

      const isFolder = item.classList.contains('folder');

      if (isFolder) {
        // フォルダの展開/折り畳み
        item.classList.toggle('collapsed');
        
        // 次のアイテムを取得
        let nextItem = item.nextElementSibling;
        
        // collapsed状態の時に子要素を隠す
        if (item.classList.contains('collapsed')) {
          // 次のdepthが高いアイテムをすべて隠す
          const currentDepth = parseInt(item.className.match(/depth-(\d+)/)[1]);
          while (nextItem) {
            const nextDepth = parseInt(nextItem.className.match(/depth-(\d+)/)[1]);
            if (nextDepth <= currentDepth) break;
            nextItem.style.display = 'none';
            nextItem = nextItem.nextElementSibling;
          }
        } else {
          // 次のdepthが1つ高いアイテムだけを表示
          const currentDepth = parseInt(item.className.match(/depth-(\d+)/)[1]);
          const nextDepth = currentDepth + 1;
          while (nextItem) {
            const itemDepth = parseInt(nextItem.className.match(/depth-(\d+)/)[1]);
            if (itemDepth < currentDepth) break;
            if (itemDepth === nextDepth || (itemDepth > nextDepth && nextItem.previousElementSibling && !nextItem.previousElementSibling.classList.contains('collapsed'))) {
              nextItem.style.display = '';
            }
            nextItem = nextItem.nextElementSibling;
          }
        }
      } else {
        // ファイルの選択
        document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        selectedItem = item.textContent.trim();
        selectBtn.disabled = false;
      }
    });

    // 選択ボタン
    selectBtn.addEventListener('click', () => {
      if (selectedItem) {
        alert(`選択ファイル: ${selectedItem}`);
      }
    });

    // キャンセルボタン
    cancelBtn.addEventListener('click', () => {
      alert('キャンセルしました');
    });

    // 検索機能
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      document.querySelectorAll('.file-item').forEach(item => {
        const name = item.querySelector('.file-name').textContent.toLowerCase();
        item.style.display = name.includes(query) ? '' : 'none';
      });
    });
  </script>
</body>
</html>
