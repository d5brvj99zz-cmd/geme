<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>シンプルシューティングゲーム</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            border: 4px solid #fff;
            background: #000;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="500"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- ゲームの設定 ---
let player = { x: 180, y: 450, width: 40, height: 20, speed: 5 };
let bullets = [];
let enemies = [];
let score = 0;
let gameOver = false;

// キーボードの入力状態を管理
let keys = {};
window.addEventListener("keydown", (e) => keys[e.key] = true);
window.addEventListener("keyup", (e) => keys[e.key] = false);

// 弾を発射する間隔を制限するタイマー
let shotTimer = 0;

// --- ゲームループ ---
function gameLoop() {
    if (gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "30px sans-serif";
        ctx.fillText("GAME OVER", 110, 250);
        ctx.font = "20px sans-serif";
        ctx.fillText("リロードして再挑戦", 120, 290);
        return;
    }

    // 1. 画面をクリア
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 2. 自機の移動
    if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
    if (keys["ArrowRight"] && player.x < canvas.width - player.width) player.x += player.speed;

    // 3. 弾の発射（スペースキー）
    if (keys[" "] && shotTimer === 0) {
        bullets.push({ x: player.x + player.width / 2 - 2, y: player.y, width: 4, height: 10 });
        shotTimer = 10; // 連続発射のウェイト
    }
    if (shotTimer > 0) shotTimer--;

    // 4. 敵の自動生成
    if (Math.random() < 0.02) { // 約2%の確率で毎フレーム敵を生成
        enemies.push({ x: Math.random() * (canvas.width - 30), y: 0, width: 30, height: 30, speed: 2 });
    }

    // 5. 弾の移動と描画
    ctx.fillStyle = "yellow";
    bullets.forEach((bullet, bIndex) => {
        bullet.y -= 7; // 上に移動
        ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
        
        // 画面外に出た弾を削除
        if (bullet.y < 0) bullets.splice(bIndex, 1);
    });

    // 6. 敵の移動と描画
    ctx.fillStyle = "red";
    enemies.forEach((enemy, eIndex) => {
        enemy.y += enemy.speed; // 下に移動
        ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

        // 自機と敵の衝突判定
        if (enemy.x < player.x + player.width &&
            enemy.x + enemy.width > player.x &&
            enemy.y < player.y + player.height &&
            enemy.y + enemy.height > player.y) {
            gameOver = true;
        }

        // 画面外に出た敵を削除
        if (enemy.y > canvas.height) enemies.splice(eIndex, 1);
    });

    // 7. 弾と敵の当たり判定
    bullets.forEach((bullet, bIndex) => {
        enemies.forEach((enemy, eIndex) => {
            if (bullet.x < enemy.x + enemy.width &&
                bullet.x + bullet.width > enemy.x &&
                bullet.y < enemy.y + enemy.height &&
                bullet.y + bullet.height > enemy.y) {
                
                // 当たったら両方消す
                bullets.splice(bIndex, 1);
                enemies.splice(eIndex, 1);
                score += 100;
            }
        });
    });

    // 8. 自機の描画
    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x, player.y, player.width, player.height);

    // 9. スコアの描画
    ctx.fillStyle = "white";
    ctx.font = "16px sans-serif";
    ctx.fillText("SCORE: " + score, 10, 25);

    // 次のフレームを要請
    requestAnimationFrame(gameLoop);
}

// ゲームスタート
gameLoop();
</script>

</body>
</html>
